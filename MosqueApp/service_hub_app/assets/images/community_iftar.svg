<svg width="280" height="200" viewBox="0 0 280 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90A4;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#2E5266;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="moon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF8DC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F0E68C;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="280" height="200" fill="url(#bg)"/>
  
  <!-- Stars -->
  <circle cx="50" cy="30" r="2" fill="white" opacity="0.8"/>
  <circle cx="80" cy="20" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="120" cy="25" r="1" fill="white" opacity="0.7"/>
  <circle cx="200" cy="35" r="2" fill="white" opacity="0.8"/>
  <circle cx="230" cy="20" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="250" cy="40" r="1" fill="white" opacity="0.7"/>
  
  <!-- Crescent Moon -->
  <path d="M180 45 C190 35, 210 35, 220 45 C210 55, 190 55, 180 45 Z" fill="url(#moon)"/>
  <circle cx="195" cy="45" r="12" fill="url(#bg)"/>
  
  <!-- Mosque Silhouette -->
  <path d="M40 120 L40 160 L100 160 L100 120 C100 110, 90 100, 80 100 L60 100 C50 100, 40 110, 40 120 Z" fill="rgba(0,0,0,0.3)"/>
  <rect x="65" y="80" width="10" height="40" fill="rgba(0,0,0,0.3)"/>
  <circle cx="70" cy="75" r="8" fill="rgba(0,0,0,0.3)"/>
  
  <!-- Food Items -->
  <ellipse cx="140" cy="140" rx="25" ry="8" fill="rgba(255,255,255,0.2)"/>
  <circle cx="130" cy="135" r="6" fill="rgba(255,215,0,0.7)"/>
  <circle cx="140" cy="138" r="5" fill="rgba(255,140,0,0.7)"/>
  <circle cx="150" cy="135" r="6" fill="rgba(255,69,0,0.7)"/>
  
  <!-- Dates -->
  <ellipse cx="200" cy="150" rx="20" ry="6" fill="rgba(139,69,19,0.6)"/>
  <ellipse cx="195" cy="147" rx="4" ry="6" fill="rgba(160,82,45,0.8)"/>
  <ellipse cx="200" cy="147" rx="4" ry="6" fill="rgba(160,82,45,0.8)"/>
  <ellipse cx="205" cy="147" rx="4" ry="6" fill="rgba(160,82,45,0.8)"/>
  
  <!-- Water Glass -->
  <rect x="220" y="130" width="12" height="20" rx="2" fill="rgba(255,255,255,0.3)" stroke="rgba(255,255,255,0.5)" stroke-width="1"/>
  <rect x="221" y="135" width="10" height="12" fill="rgba(135,206,235,0.6)"/>
</svg>