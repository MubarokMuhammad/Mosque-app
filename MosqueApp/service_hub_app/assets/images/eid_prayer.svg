<svg width="280" height="200" viewBox="0 0 280 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90A4;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#2E5266;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="mosque" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F5F5DC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#DDD;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="dome" cx="50%" cy="30%" r="70%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#DAA520;stop-opacity:1" />
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="280" height="200" fill="url(#bg2)"/>
  
  <!-- Sun rays -->
  <path d="M140 20 L145 35 L140 50 L135 35 Z" fill="rgba(255,215,0,0.6)"/>
  <path d="M120 30 L135 35 L150 30 L135 25 Z" fill="rgba(255,215,0,0.6)"/>
  <path d="M160 30 L145 35 L130 30 L145 25 Z" fill="rgba(255,215,0,0.6)"/>
  
  <!-- Main Mosque Structure -->
  <rect x="80" y="100" width="120" height="80" fill="url(#mosque)" stroke="rgba(0,0,0,0.1)" stroke-width="1"/>
  
  <!-- Central Dome -->
  <ellipse cx="140" cy="100" rx="30" ry="20" fill="url(#dome)"/>
  <rect x="135" y="80" width="10" height="25" fill="#DAA520"/>
  <circle cx="140" cy="75" r="5" fill="#FFD700"/>
  
  <!-- Minarets -->
  <rect x="60" y="60" width="15" height="120" fill="url(#mosque)"/>
  <ellipse cx="67.5" cy="60" rx="10" ry="8" fill="url(#dome)"/>
  <rect x="65" y="50" width="5" height="15" fill="#DAA520"/>
  <circle cx="67.5" cy="45" r="3" fill="#FFD700"/>
  
  <rect x="205" y="60" width="15" height="120" fill="url(#mosque)"/>
  <ellipse cx="212.5" cy="60" rx="10" ry="8" fill="url(#dome)"/>
  <rect x="210" y="50" width="5" height="15" fill="#DAA520"/>
  <circle cx="212.5" cy="45" r="3" fill="#FFD700"/>
  
  <!-- Entrance Arch -->
  <path d="M120 180 L120 140 C120 130, 130 120, 140 120 C150 120, 160 130, 160 140 L160 180 Z" fill="rgba(0,0,0,0.2)"/>
  
  <!-- Islamic Geometric Pattern -->
  <g opacity="0.3">
    <circle cx="100" cy="130" r="8" fill="none" stroke="white" stroke-width="1"/>
    <path d="M100 122 L108 130 L100 138 L92 130 Z" fill="white"/>
    
    <circle cx="180" cy="130" r="8" fill="none" stroke="white" stroke-width="1"/>
    <path d="M180 122 L188 130 L180 138 L172 130 Z" fill="white"/>
  </g>
  
  <!-- Prayer Mats -->
  <rect x="40" y="170" width="200" height="8" fill="rgba(139,69,19,0.4)" rx="2"/>
  <rect x="45" y="172" width="15" height="4" fill="rgba(178,34,34,0.6)"/>
  <rect x="65" y="172" width="15" height="4" fill="rgba(0,100,0,0.6)"/>
  <rect x="85" y="172" width="15" height="4" fill="rgba(0,0,139,0.6)"/>
  <rect x="105" y="172" width="15" height="4" fill="rgba(178,34,34,0.6)"/>
  <rect x="125" y="172" width="15" height="4" fill="rgba(0,100,0,0.6)"/>
  <rect x="145" y="172" width="15" height="4" fill="rgba(0,0,139,0.6)"/>
  <rect x="165" y="172" width="15" height="4" fill="rgba(178,34,34,0.6)"/>
  <rect x="185" y="172" width="15" height="4" fill="rgba(0,100,0,0.6)"/>
  <rect x="205" y="172" width="15" height="4" fill="rgba(0,0,139,0.6)"/>
  <rect x="225" y="172" width="15" height="4" fill="rgba(178,34,34,0.6)"/>
</svg>